<script>

const pages = [
					{ url: 'login.htm', id: 'page-login' },
					{ url: 'layout.htm', id: 'page-layout' },
					{ url: 'home.htm', id: 'page-home' },
					{ url: 'game.htm', id: 'page-game' },
					{ url: 'shop.htm', id: 'page-shop' },
					{ url: 'event.htm', id: 'page-event' },
					{ url: 'rank.htm', id: 'page-rank' },
					{ url: 'game-modal.htm', id: 'page-game-modal' },
					{ url: 'shop-modal.htm', id: 'page-shop-modal' },
					{ url: 'event-modal.htm', id: 'page-event-modal' },
					{ url: 'system-settings-modal.htm', id: 'page-system-settings-modal' },
					{ url: 'game-license-modal.htm', id: 'page-game-license-modal' },
					{ url: 'start-session.htm', id: 'page-start-session' },
					{ url: 'member-modal.htm', id: 'page-member-modal' },
				];
async function loadPages()
{
	$('#main_body').hide();
	for(i = 0; i < pages.length; i ++)
	{
		const page = pages[i];
		const ret = await fetch(page.url, {cache: 'no-cache'});
		const text = await ret.text();
		await $('#'+page.id).html(text);
	};
	
	// Load member sidebar into class .member-sidebar
	const ret = await fetch('member-sidebar.htm', {cache: 'no-cache'});
	const text = await ret.text();
	$('.member-sidebar').html(text);
}

loadPages().then(() => main()).then(() => {
	$('#main_body').show();
	ICAFEMENU_CORE.translate_obj(document.body);
});
</script>
