
<style>
/* Gaming UI Styles - Circuit Imitation */
:root {
    --circuit-bg: transparent;
    --circuit-card-bg: rgba(15, 20, 28, 0.85);
    --circuit-input-bg: rgba(25, 32, 45, 0.6);
    --circuit-border: rgba(255, 255, 255, 0.1);
    --circuit-accent: #ffffff;
    --circuit-text: #ffffff;
    --circuit-text-dim: #8a8f9d;
    --circuit-primary: #ffffff;
    --circuit-primary-hover: #f0f0f0;
}

#page_login {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--circuit-text);
    position: relative;
    z-index: 1;
}

.circuit-login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--circuit-card-bg);
    backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 40px;
    border: 1px solid var(--circuit-border);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    text-align: center;
}

.circuit-logo {
    margin-bottom: 24px;
}

.circuit-logo i {
    font-size: 32px;
    color: var(--circuit-text);
    margin-bottom: 16px;
    display: block;
}

.circuit-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.circuit-subtitle {
    font-size: 14px;
    color: var(--circuit-text-dim);
    margin-bottom: 32px;
}

.circuit-info-box {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 24px;
    font-size: 12px;
    color: #60a5fa;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
}

.circuit-form-group {
    margin-bottom: 16px;
    position: relative;
}

.circuit-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.circuit-input-icon {
    position: absolute;
    left: 16px;
    color: var(--circuit-text-dim);
    font-size: 14px;
}

.circuit-input {
    width: 100%;
    background: var(--circuit-input-bg);
    border: 1px solid var(--circuit-border);
    border-radius: 8px;
    padding: 14px 16px 14px 44px;
    color: white;
    font-size: 14px;
    transition: all 0.2s;
}

.circuit-input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(25, 32, 45, 0.8);
}

.circuit-password-toggle {
    position: absolute;
    right: 16px;
    color: var(--circuit-text-dim);
    cursor: pointer;
    font-size: 14px;
}

.circuit-btn-primary {
    width: 100%;
    background: var(--circuit-primary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
}

.circuit-btn-primary:hover {
    background: var(--circuit-primary-hover);
    transform: translateY(-1px);
}

.circuit-btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.circuit-forgot-password {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    color: #3b82f6;
    text-decoration: none;
}

.circuit-divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
    color: var(--circuit-text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.circuit-divider::before,
.circuit-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--circuit-border);
}

.circuit-divider span {
    padding: 0 12px;
}

.circuit-social-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
}

.circuit-btn-social {
    background: var(--circuit-input-bg);
    border: 1px solid var(--circuit-border);
    border-radius: 8px;
    padding: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.circuit-btn-social:hover {
    background: rgba(255, 255, 255, 0.05);
}

.circuit-extra-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
}

.circuit-btn-extra {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--circuit-border);
    border-radius: 8px;
    padding: 10px;
    color: var(--circuit-text-dim);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.circuit-btn-extra:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
}

.circuit-footer-link {
    font-size: 13px;
    color: var(--circuit-text-dim);
}

.circuit-footer-link a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
}

.circuit-bottom-info {
    position: absolute;
    bottom: 40px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 1;
}

.circuit-pc-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
}

.circuit-version {
    font-size: 11px;
    color: var(--circuit-text-dim);
}

.circuit-lang-selector {
    font-size: 12px;
    color: #3b82f6;
    margin-bottom: 12px;
    cursor: pointer;
}

.feedback-icon {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 2;
    display: flex;
    gap: 15px;
}

.feedback-icon a {
    color: white;
    opacity: 0.6;
    transition: opacity 0.2s;
    font-size: 20px;
}

.feedback-icon a:hover {
    opacity: 1;
}

/* Modal Styles */
.modal-content {
    background: #1a1f2b;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
}
.modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
.modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
.close { color: white; }
.form-control.modal-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
}
</style>

<div id="page_login" v-show="vueGlobal.currentView == 'login'">
    <div class="feedback-icon">
        <a href="javascript:void(0)" title="Shutdown" onclick="javascript:shutdown_click()">
            <i class="fal fa-power-off"></i> 
        </a>
        <a href="javascript:void(0)" title="Reboot" onclick="javascript:reboot_click()">
            <i class="fal fa-rotate-right"></i> 
        </a>
    </div>

    <div class="circuit-login-container">
        <div class="circuit-logo">
            <i class="fal fa-gamepad"></i>
            <div class="circuit-title">CIRCUIT</div>
            <div class="circuit-subtitle lang">Log in with your credentials</div>
        </div>

        <!-- Main Login View -->
        <div v-show="vueLoginMode.active_tab === 'account'">
            <div class="circuit-info-box">
                <i class="fal fa-info-circle"></i>
                <span class="lang">Any login credentials will be accepted for web-demo</span>
            </div>

            <form @submit.prevent="multi_mode_login()">
                <div class="circuit-form-group">
                    <div class="circuit-input-wrapper">
                        <i class="fal fa-user circuit-input-icon"></i>
                        <input type="text" class="circuit-input lang" placeholder="Email or Username" v-model="vueLogin.username">
                    </div>
                </div>
                <div class="circuit-form-group">
                    <div class="circuit-input-wrapper">
                        <i class="fal fa-lock circuit-input-icon"></i>
                        <input :type="vueLogin.showPassword ? 'text' : 'password'" class="circuit-input lang" placeholder="Password" v-model="vueLogin.password">
                        <i class="fal circuit-password-toggle" :class="vueLogin.showPassword ? 'fa-eye-slash' : 'fa-eye'" @click="vueLogin.showPassword = !vueLogin.showPassword"></i>
                    </div>
                </div>
                <button type="submit" class="circuit-btn-primary lang" :disabled="vueGlobal.isLoading">Log in</button>
                <a href="javascript:void(0)" class="circuit-forgot-password lang" @click="theForgotPassword.show_dialog()">Forgot password?</a>
            </form>

            <div class="circuit-divider">
                <span>Continue with</span>
            </div>

            <div class="circuit-social-buttons">
                <button class="circuit-btn-social" onclick="theMemberLogin.show_dialog()">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
                <button class="circuit-btn-social" onclick="theMemberLogin.show_dialog()">
                    <i class="fab fa-google"></i> Google
                </button>
            </div>

            <!-- Admin and Balance Buttons below Social Logins -->
            <div class="circuit-extra-buttons">
                <button class="circuit-btn-extra" @click="login_switch_tab('admin')">
                    <i class="fal fa-shield-check"></i> Admin
                </button>
                <button class="circuit-btn-extra" @click="login_switch_tab('balance')">
                    <i class="fal fa-coins"></i> Balance
                </button>
            </div>

            <div class="circuit-footer-link">
                <span class="lang">Don't have an account yet?</span> 
                <a href="javascript:void(0)" class="lang" onclick="theMemberRegister.show_client_register()">Create account</a>
            </div>
        </div>

        <!-- Admin Login View -->
        <div v-show="vueLoginMode.active_tab === 'admin'">
            <div class="circuit-logo">
                <div class="circuit-title">Admin</div>
                <div class="circuit-subtitle lang">Enter admin password to exit</div>
            </div>
            <form @submit.prevent="admin_exit_form_submit()">
                <div class="circuit-form-group">
                    <div class="circuit-input-wrapper">
                        <i class="fal fa-shield-check circuit-input-icon"></i>
                        <input type="password" class="circuit-input lang" placeholder="Admin Password" v-model="vueAdminExit.password">
                    </div>
                </div>
                <button type="submit" class="circuit-btn-primary lang" :disabled="vueGlobal.isLoading">Admin Login</button>
                <button type="button" class="circuit-btn-extra w-100 mt-3" @click="login_switch_tab('account')">Back to Login</button>
            </form>
        </div>

        <!-- Balance / Topup View -->
        <div v-show="vueLoginMode.active_tab === 'balance'">
            <div class="circuit-logo">
                <div class="circuit-title">Balance</div>
                <div class="circuit-subtitle lang">Top up your account</div>
            </div>
            <form @submit.prevent="theTopupLogin.create_topup_qrcode()">
                <div class="circuit-form-group">
                    <div class="circuit-input-wrapper">
                        <i class="fal fa-envelope circuit-input-icon"></i>
                        <input type="text" class="circuit-input lang" placeholder="Member Email" v-model="vueTopupLogin.member_email">
                    </div>
                </div>
                <div class="circuit-form-group">
                    <div class="circuit-input-wrapper">
                        <i class="fal fa-coins circuit-input-icon"></i>
                        <input type="number" class="circuit-input lang" placeholder="Topup Amount" v-model="vueTopupLogin.topup_amount">
                    </div>
                </div>
                <button type="submit" class="circuit-btn-primary lang" :disabled="vueGlobal.isLoading">Top up</button>
                <button type="button" class="circuit-btn-extra w-100 mt-3" @click="login_switch_tab('account')">Back to Login</button>
            </form>
        </div>
    </div>

    <div class="circuit-bottom-info">
        <div class="circuit-lang-selector">
            English <i class="fal fa-chevron-down"></i>
        </div>
        <div class="circuit-pc-name">{{ vueGlobal.pcName }}</div>
        <div class="circuit-version">{{ vueGlobal.versionDate }}</div>
    </div>
</div>

<!-- Modals (Kept for functionality) -->
<div class="modal" tabindex="-1" role="dialog" :class="{show: vueGlobal.modals.forgotPassword}" :style="{display: vueGlobal.modals.forgotPassword ? 'block' : 'none'}">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title lang">Forgot password</h5>
                <button type="button" class="close" @click="vueGlobal.modals.forgotPassword = false">&times;</button>
            </div>
            <form @submit.prevent="theForgotPassword.submit_form()">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="lang">Email or Phone</label>
                        <input type="text" class="form-control modal-input" v-model="vueForgotPassword.email" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary lang">Submit</button>
                    <button type="button" class="btn btn-secondary lang" @click="vueGlobal.modals.forgotPassword = false">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
